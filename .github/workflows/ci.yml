name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Run PHP CS Fixer
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no --sequential

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse -c phpstan.neon.dist --no-progress --no-ansi --memory-limit=512M

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: php-${{ matrix.php }}
          token: ${{ secrets.CODECOV_TOKEN }}

  phpdocumentor-v5-compatibility:
    name: phpDocumentor ^5.3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: xdebug
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --with phpdocumentor/reflection-docblock:^5.3 --with-all-dependencies --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse -c phpstan.neon.dist --no-progress --no-ansi --memory-limit=512M

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: phpdocumentor-v5
          token: ${{ secrets.CODECOV_TOKEN }}
